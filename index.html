<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #0a0d14;
    /* prevent rubber-band scroll on iOS when running fullscreen */
    overscroll-behavior: none;
    -webkit-tap-highlight-color: transparent;
  }
  body {
    font-family: 'Cormorant Garamond', Georgia, serif;
    /* respect the notch / home indicator on iPhone */
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    min-height: 100vh;
  }
  * { box-sizing: border-box; }
  button {
    font-family: inherit;
    -webkit-appearance: none;
    -webkit-touch-callout: none;

    user-select: none;
    touch-action: manipulation; /* removes 300ms tap delay */
  }

  select, input { font-size: 16px; }
  input[type=range] { accent-color: #a8d8a8; }
</style>

<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

const NOTE_SHARPS = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
const NOTE_FLATS  = ["C", "Db", "D", "Eb", "E", "F", "Gb", "G", "Ab", "A", "Bb", "B"];

const INSTRUMENTS = [
  { id: "concert", label: "Concert pitch (C)", semitones: 0 },
  { id: "bb", label: "B♭ instrument (trumpet, clarinet, tenor sax)", semitones: 2 },
  { id: "eb", label: "E♭ instrument (alto sax, alto clarinet)", semitones: 9 },
  { id: "f", label: "F instrument (French horn, English horn)", semitones: 7 },
  { id: "bb_bass", label: "B♭ bass (bass clarinet, tenor sax 8va)", semitones: 14 },
  { id: "guitar", label: "Guitar (sounds 8va below written)", semitones: -12 },
];

function freqToNote(freq, a4 = 440, useFlats = false, transposeSemitones = 0) {
  if (!freq || freq <= 0) return null;
  const concertMidi = 69 + 12 * Math.log2(freq / a4);
  const writtenMidiFloat = concertMidi + transposeSemitones;
  const midi = Math.round(writtenMidiFloat);
  const cents = Math.round((writtenMidiFloat - midi) * 100);
  const names = useFlats ? NOTE_FLATS : NOTE_SHARPS;
  const note = names[((midi % 12) + 12) % 12];
  const octave = Math.floor(midi / 12) - 1;
  return { note, octave, cents, midi, freq };
}

function noteToFreq(noteName, octave, a4 = 440) {
  const sharpsIdx = NOTE_SHARPS.indexOf(noteName);
  const flatsIdx = NOTE_FLATS.indexOf(noteName);
  const idx = sharpsIdx >= 0 ? sharpsIdx : flatsIdx;
  if (idx < 0) return null;
  const midi = (octave + 1) * 12 + idx;
  return a4 * Math.pow(2, (midi - 69) / 12);
}

function autoCorrelate(buf, sampleRate) {
  const SIZE = buf.length;
  let rms = 0;
  for (let i = 0; i < SIZE; i++) rms += buf[i] * buf[i];
  rms = Math.sqrt(rms / SIZE);
  if (rms < 0.003) return -1;

  // Trim quiet edges
  let r1 = 0, r2 = SIZE - 1;
  const thres = 0.05;
  for (let i = 0; i < SIZE / 2; i++) if (Math.abs(buf[i]) < thres) { r1 = i; break; }
  for (let i = 1; i < SIZE / 2; i++) if (Math.abs(buf[SIZE - i]) < thres) { r2 = SIZE - i; break; }
  const trimmed = buf.slice(r1, r2);
  const n = trimmed.length;

  const minLag = Math.max(2, Math.floor(sampleRate / 1500));
  const maxLag = Math.min(n - 2, Math.floor(sampleRate / 50));

  let bestLag = -1;
  let bestCorr = 0;
  let prevCorr = 0;
  let foundDip = false;

  for (let lag = minLag; lag <= maxLag; lag++) {
    let corr = 0;
    const limit = n - lag;
    for (let j = 0; j < limit; j++) corr += trimmed[j] * trimmed[j + lag];
    corr = corr / limit; 

    if (!foundDip) {
      if (corr < prevCorr) foundDip = true;
    } else if (corr > bestCorr) {
      bestCorr = corr;
      bestLag = lag;
    }
    prevCorr = corr;
  }

  if (bestLag < 0 || bestCorr < 0.01) return -1;

  let T0 = bestLag;
  if (bestLag > minLag && bestLag < maxLag) {
    let cm1 = 0, c0 = 0, cp1 = 0;
    const lm1 = bestLag - 1, lp1 = bestLag + 1;
    for (let j = 0; j < n - lp1; j++) {
      cm1 += trimmed[j] * trimmed[j + lm1];
      c0  += trimmed[j] * trimmed[j + bestLag];
      cp1 += trimmed[j] * trimmed[j + lp1];
    }
    const a = (cm1 + cp1 - 2 * c0) / 2;
    const b = (cp1 - cm1) / 2;
    if (a) T0 = bestLag - b / (2 * a);
  }

  return sampleRate / T0;
}

function btnStyle(border, color) {
  return {
    background: "transparent",
    border: `1px solid ${border}`,
    color,
    padding: "12px 24px",
    fontSize: 11,
    letterSpacing: "0.3em",
    textTransform: "uppercase",
    fontFamily: "'JetBrains Mono', monospace",
    cursor: "pointer",
    transition: "all 200ms ease",
  };
}

function chipStyle(active) {
  return {
    background: active ? "rgba(168,216,168,0.12)" : "transparent",
    border: `1px solid ${active ? "#a8d8a8" : "#2a2f3a"}`,
    color: active ? "#a8d8a8" : "#8a8478",
    padding: "5px 10px",
    fontSize: 11,
    fontFamily: "'JetBrains Mono', monospace",
    cursor: "pointer",
    borderRadius: 2,
    transition: "all 150ms ease",
  };
}

const labelStyle = {
  fontSize: 10,
  letterSpacing: "0.25em",
  textTransform: "uppercase",
  color: "#8a8478",
  marginBottom: 10,
};

function Tuner() {
  const [a4, setA4] = useState(440);
  const [useFlats, setUseFlats] = useState(false);
  const [instrument, setInstrument] = useState("concert");
  const [showSettings, setShowSettings] = useState(false);

  const [refPlaying, setRefPlaying] = useState(false);
  const [refNote, setRefNote] = useState("A");
  const [refOctave, setRefOctave] = useState(4);

  const [running, setRunning] = useState(false);
  const [error, setError] = useState(null);
  const [reading, setReading] = useState(null);
  const [smoothCents, setSmoothCents] = useState(0);
  const [audioLevel, setAudioLevel] = useState(0);

  const audioCtxRef = useRef(null);
  const analyserRef = useRef(null);
  const rafRef = useRef(null);
  const streamRef = useRef(null);
  const bufferRef = useRef(null);
  const recentFreqsRef = useRef([]);
  
  // Real-time canvas tracking configurations
  const canvasRef = useRef(null);
  const pitchHistoryRef = useRef([]);
  const maxHistoryPoints = 350; 

  const refOscRef = useRef(null);
  const refGainRef = useRef(null);
  const refCtxRef = useRef(null);

  const transposeSemitones = INSTRUMENTS.find((i) => i.id === instrument)?.semitones ?? 0;

  async function start() {
    try {
      setError(null);
      const constraints = {
        audio: {
          echoCancellation: false,
          noiseSuppression: false,
          autoGainControl: false,
          sampleRate: 48000,
          channelCount: 1,
          googEchoCancellation: false,
          googAutoGainControl: false,
          googNoiseSuppression: false,
          googHighpassFilter: false,
          googTypingNoiseDetection: false,
        },
      };
      let stream;
      try {
        stream = await navigator.mediaDevices.getUserMedia(constraints);
      } catch (e) {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      }
      streamRef.current = stream;
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      const ctx = new AudioCtx();
      audioCtxRef.current = ctx;
      if (ctx.state === "suspended") {
        try { await ctx.resume(); } catch (e) {}
      }
      const source = ctx.createMediaStreamSource(stream);
      const gain = ctx.createGain();
      gain.gain.value = 25;
      const analyser = ctx.createAnalyser();
      analyser.fftSize = 2048;
      source.connect(gain);
      gain.connect(analyser);
      analyserRef.current = analyser;
      bufferRef.current = new Float32Array(analyser.fftSize);
      setRunning(true);
      
      // Flush previous line trace history upon re-starting context
      pitchHistoryRef.current = [];
      
      tick();
    } catch (e) {
      setError((e && e.message) || "Could not access microphone.");
      setRunning(false);
    }
  }

  function stop() {
    setRunning(false);
    if (rafRef.current) {
      cancelAnimationFrame(rafRef.current);
      rafRef.current = null;
    }
    if (streamRef.current) streamRef.current.getTracks().forEach((t) => t.stop());
    if (audioCtxRef.current) {
      try { audioCtxRef.current.close(); } catch (e) {}
    }
    streamRef.current = null;
    audioCtxRef.current = null;
    analyserRef.current = null;
    setReading(null);
    setSmoothCents(0);
    recentFreqsRef.current = [];
    
    // Clear the active rendering timeline canvas
    const canvas = canvasRef.current;
    if (canvas) {
      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
  }

  function drawPitchTimeline() {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const w = canvas.width;
    const h = canvas.height;

    ctx.clearRect(0, 0, w, h);

    // Render subtle decorative scale background tracks
    ctx.strokeStyle = "rgba(255, 255, 255, 0.03)";
    ctx.lineWidth = 1;
    const trackCount = 5;
    for (let i = 1; i <= trackCount; i++) {
      const yPos = (h / (trackCount + 1)) * i;
      ctx.beginPath();
      ctx.moveTo(0, yPos);
      ctx.lineTo(w, yPos);
      ctx.stroke();
    }

    const history = pitchHistoryRef.current;
    if (history.length === 0) return;

    // Filter valid frequencies to define a local auto-scaling bound
    const activePitches = history.filter((p) => p !== null);
    let minF = 65;   // Stable default bottom bound (approx C2)
    let maxF = 1050; // Stable default upper bound (approx C6)

    if (activePitches.length > 0) {
      const dataMin = Math.min(...activePitches);
      const dataMax = Math.max(...activePitches);
      // Pad boundaries dynamically so line trajectory doesn't clamp out of frame
      minF = Math.max(40, dataMin * 0.88);
      maxF = Math.min(2500, dataMax * 1.12);
    }

    ctx.lineWidth = 2.5;
    ctx.strokeStyle = "#a8d8a8"; 
    ctx.shadowBlur = 6;
    ctx.shadowColor = "rgba(168, 216, 168, 0.4)";
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.beginPath();

    let isDrawing = false;

    for (let i = 0; i < history.length; i++) {
      const freq = history[i];
      // Generate standard right-to-left rolling timeline positioning
      const x = (i / (maxHistoryPoints - 1)) * w;

      if (freq === null || freq <= 0) {
        isDrawing = false;
        continue;
      }

      // Safe logarithmic pitch mapping logic to emulate linear sensory distribution
      const logMin = Math.log2(minF);
      const logMax = Math.log2(maxF);
      const logVal = Math.log2(freq);
      const y = h - ((logVal - logMin) / (logMax - logMin)) * h;

      if (!isDrawing) {
        ctx.moveTo(x, y);
        isDrawing = true;
      } else {
        ctx.lineTo(x, y);
      }
    }
    ctx.stroke();
    ctx.shadowBlur = 0; // Reset canvas context state
  }

  function tick() {
    const analyser = analyserRef.current;
    const ctx = audioCtxRef.current;
    const buf = bufferRef.current;
    if (!analyser || !ctx) return;
    analyser.getFloatTimeDomainData(buf);

    let peak = 0;
    for (let i = 0; i < buf.length; i++) {
      const v = Math.abs(buf[i]);
      if (v > peak) peak = v;
    }
    setAudioLevel(peak);

    const freq = autoCorrelate(buf, ctx.sampleRate);
    const history = pitchHistoryRef.current;

    if (freq > 0 && freq < 4000) {
      const recent = recentFreqsRef.current;

      if (recent.length >= 2) {
        const sortedPrev = [...recent].sort((a, b) => a - b);
        const prevMedian = sortedPrev[Math.floor(sortedPrev.length / 2)];
        const ratio = freq / prevMedian;
        if (ratio > 1.0176 || ratio < 0.9827) {
          recent.length = 0;
        }
      }

      recent.push(freq);
      if (recent.length > 3) recent.shift();
      const sorted = [...recent].sort((a, b) => a - b);
      const median = sorted[Math.floor(sorted.length / 2)];
      const r = freqToNote(median, a4, useFlats, transposeSemitones);
      if (r) {
        setReading(r);
        setSmoothCents((prev) => prev + (r.cents - prev) * 0.4);
      }
      
      history.push(median);
    } else {
      // Input drops under pitch thresholds: pass gap to stop connecting lines across silences
      history.push(null);
    }

    if (history.length > maxHistoryPoints) {
      history.shift();
    }

    // Paint contour line onto canvas
    drawPitchTimeline();

    rafRef.current = requestAnimationFrame(tick);
  }

  function playReference() {
    stopReference();
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    const ctx = new AudioCtx();
    refCtxRef.current = ctx;
    const freq = noteToFreq(refNote, refOctave, a4);
    if (!freq) return;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = "sine";
    osc.frequency.value = freq;
    gain.gain.value = 0;
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    gain.gain.linearRampToValueAtTime(0.15, ctx.currentTime + 0.05);
    refOscRef.current = osc;
    refGainRef.current = gain;
    setRefPlaying(true);
  }

  function stopReference() {
    if (refOscRef.current && refGainRef.current && refCtxRef.current) {
      const ctx = refCtxRef.current;
      const gain = refGainRef.current;
      const osc = refOscRef.current;
      gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.05);
      setTimeout(() => {
        try { osc.stop(); } catch (e) {}
        try { ctx.close(); } catch (e) {}
      }, 80);
    }
    refOscRef.current = null;
    refGainRef.current = null;
    refCtxRef.current = null;
    setRefPlaying(false);
  }

  useEffect(() => () => { stop(); stopReference(); }, []);

  useEffect(() => {
    const onVis = () => {
      if (!document.hidden && audioCtxRef.current && audioCtxRef.current.state === "suspended") {
        audioCtxRef.current.resume().catch(() => {});
      }
    };
    document.addEventListener("visibilitychange", onVis);
    return () => document.removeEventListener("visibilitychange", onVis);
  }, []);

  useEffect(() => {
    if (reading) {
      const r = freqToNote(reading.freq, a4, useFlats, transposeSemitones);
      if (r) setReading(r);
    }
  }, [a4, useFlats, transposeSemitones]);

  useEffect(() => {
    if (refPlaying) playReference();
  }, [refNote, refOctave, a4]);

  const cents = reading ? smoothCents : 0;
  const inTune = reading && Math.abs(reading.cents) <= 5;
  const close = reading && Math.abs(reading.cents) <= 15;
  const needleAngle = Math.max(-50, Math.min(50, cents));

  const refNoteList = useFlats ? NOTE_FLATS : NOTE_SHARPS;
  const instrumentLabel = INSTRUMENTS.find((i) => i.id === instrument).label;

  return (
    <div style={{
      minHeight: "100vh",
      background: "radial-gradient(ellipse at top, #1a1f2e 0%, #0a0d14 100%)",
      color: "#e8e6e1",
      fontFamily: "'Cormorant Garamond', Georgia, serif",
      padding: "32px 20px",
      display: "flex",
      flexDirection: "column",
      alignItems: "center",
    }}>
      <div style={{ width: "100%", maxWidth: 560 }}>
        <div style={{ textAlign: "center", marginBottom: 24 }}>
          <div style={{
            fontSize: 11,
            letterSpacing: "0.4em",
            color: "#8a8478",
            textTransform: "uppercase",
            marginBottom: 6,
          }}>
            Chromatic Tuner & Pitch Tracker
          </div>
          <div style={{
            fontFamily: "'JetBrains Mono', monospace",
            fontSize: 10,
            color: "#5a5448",
            letterSpacing: "0.2em",
          }}>
            A4 = {a4} Hz · ±5¢ tolerance · {instrumentLabel.split(" ")[0]}
          </div>
        </div>

        <div style={{
          background: "linear-gradient(180deg, #14181f 0%, #0c0f15 100%)",
          border: "1px solid #2a2f3a",
          borderRadius: 4,
          padding: "32px 24px 24px",
          boxShadow: "inset 0 1px 0 rgba(255,255,255,0.04), 0 20px 60px rgba(0,0,0,0.5)",
        }}>
          <div style={{
            textAlign: "center",
            minHeight: 180,
            display: "flex",
            flexDirection: "column",
            alignItems: "center",
            justifyContent: "center",
          }}>
            {reading ? (
              <>
                <div style={{ display: "flex", alignItems: "baseline", gap: 4 }}>
                  <span style={{
                    fontSize: 144,
                    lineHeight: 1,
                    fontWeight: 300,
                    letterSpacing: "-0.04em",
                    color: inTune ? "#a8d8a8" : close ? "#e8d8a8" : "#e8e6e1",
                    transition: "color 200ms ease",
                    textShadow: inTune ? "0 0 30px rgba(168,216,168,0.4)" : "none",
                  }}>
                    {reading.note.replace(/[#b]/, "")}
                  </span>
                  {reading.note.includes("#") && (
                    <span style={{ fontSize: 72, lineHeight: 1, fontWeight: 300, color: inTune ? "#a8d8a8" : close ? "#e8d8a8" : "#e8e6e1" }}>♯</span>
                  )}
                  {reading.note.includes("b") && (
                    <span style={{ fontSize: 72, lineHeight: 1, fontWeight: 300, color: inTune ? "#a8d8a8" : close ? "#e8d8a8" : "#e8e6e1" }}>♭</span>
                  )}
                  <span style={{ fontSize: 32, color: "#5a5448", fontWeight: 300, marginLeft: 8 }}>
                    {reading.octave}
                  </span>
                </div>
                <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 12, color: "#6a6458", letterSpacing: "0.1em", marginTop: 8 }}>
                  {reading.freq.toFixed(2)} Hz
                  {transposeSemitones !== 0 && (
                    <span style={{ marginLeft: 8, color: "#4a4438" }}>(written)</span>
                  )}
                </div>
              </>
            ) : (
              <div style={{ fontSize: 22, color: "#4a4438", fontStyle: "italic", letterSpacing: "0.05em" }}>
                {running ? "listening…" : "press start to begin"}
              </div>
            )}
          </div>

          <div style={{ marginTop: 24, position: "relative" }}>
            <div style={{ display: "flex", justifyContent: "space-between", fontFamily: "'JetBrains Mono', monospace", fontSize: 10, color: "#5a5448", marginBottom: 6, letterSpacing: "0.05em" }}>
              <span>−50</span><span>−25</span>
              <span style={{ color: "#a8d8a8" }}>0</span>
              <span>+25</span><span>+50</span>
            </div>
            <div style={{ position: "relative", height: 60, background: "#0a0d14", borderRadius: 2, border: "1px solid #1f242e", overflow: "hidden" }}>
              <div style={{ position: "absolute", left: "50%", top: 0, bottom: 0, width: 1, background: "rgba(168,216,168,0.3)" }} />
              <div style={{ position: "absolute", left: "calc(50% - 5%)", top: 0, bottom: 0, width: "10%", background: "linear-gradient(90deg, transparent, rgba(168,216,168,0.08), transparent)" }} />
              {[-40, -30, -20, -10, 10, 20, 30, 40].map((v) => (
                <div key={v} style={{ position: "absolute", left: `${50 + v}%`, top: 8, bottom: 8, width: 1, background: "rgba(255,255,255,0.06)" }} />
              ))}
              {reading && (
                <div style={{
                  position: "absolute",
                  left: `${50 + needleAngle}%`,
                  top: 4, bottom: 4, width: 2,
                  transform: "translateX(-50%)",
                  background: inTune ? "#a8d8a8" : close ? "#e8d8a8" : "#d88080",
                  boxShadow: inTune ? "0 0 12px rgba(168,216,168,0.6)" : close ? "0 0 8px rgba(232,216,168,0.4)" : "0 0 6px rgba(216,128,128,0.4)",
                  transition: "left 80ms ease-out, background 200ms ease",
                }} />
              )}
            </div>
            <div style={{
              textAlign: "center",
              marginTop: 10,
              fontFamily: "'JetBrains Mono', monospace",
              fontSize: 13,
              color: reading ? (inTune ? "#a8d8a8" : close ? "#e8d8a8" : "#d88080") : "#3a3428",
              letterSpacing: "0.1em",
              minHeight: 18,
            }}>
              {reading
                ? `${reading.cents > 0 ? "+" : ""}${reading.cents} cents ${inTune ? "· in tune" : reading.cents > 0 ? "· sharp" : "· flat"}`
                : "—"}
            </div>

            {/* REAL-TIME SCROLLING PITCH LINE VISUALIZATION */}
            <div style={{ marginTop: 24 }}>
              <div style={labelStyle}>Real-Time Pitch Contour Tracker</div>
              <div style={{ position: "relative", height: 150, background: "#0a0d14", borderRadius: 2, border: "1px solid #1f242e", overflow: "hidden" }}>
                <canvas 
                  ref={canvasRef} 
                  width={512} 
                  height={150} 
                  style={{ width: "100%", height: "100%", display: "block" }} 
                />
              </div>
            </div>

            {running && (
              <div style={{ marginTop: 16 }}>
                <div style={{
                  fontFamily: "'JetBrains Mono', monospace",
                  fontSize: 9,
                  color: "#5a5448",
                  letterSpacing: "0.2em",
                  textAlign: "center",
                  marginBottom: 4,
                  textTransform: "uppercase",
                }}>
                  Mic level {audioLevel < 0.05 ? "· no signal" : audioLevel < 0.2 ? "· quiet" : "· OK"}
                </div>
                <div style={{ height: 4, background: "#0a0d14", border: "1px solid #1f242e", borderRadius: 2, overflow: "hidden" }}>
                  <div style={{
                    height: "100%",
                    width: `${Math.min(100, audioLevel * 50)}%`,
                    background: audioLevel < 0.05 ? "#d88080" : audioLevel < 0.2 ? "#e8d8a8" : "#a8d8a8",
                    transition: "width 80ms ease-out, background 200ms ease",
                  }} />
                </div>
              </div>
            )}
          </div>
        </div>

        <div style={{ marginTop: 20, display: "flex", justifyContent: "center", gap: 12, flexWrap: "wrap" }}>
          {!running ? (
            <button onClick={start} style={btnStyle("#4a5468", "#e8e6e1")}>Start</button>
          ) : (
            <button onClick={stop} style={btnStyle("#6a4848", "#d88080")}>Stop</button>
          )}
          <button
            onClick={() => setShowSettings((s) => !s)}
            style={btnStyle(showSettings ? "#a8d8a8" : "#4a5468", showSettings ? "#a8d8a8" : "#a8a498")}
          >
            {showSettings ? "Hide settings" : "Settings"}
          </button>
        </div>

        {error && (
          <div style={{ marginTop: 16, textAlign: "center", color: "#d88080", fontSize: 13, fontFamily: "'JetBrains Mono', monospace" }}>
            {error}
          </div>
        )}

        {showSettings && (
          <div style={{
            marginTop: 20,
            background: "linear-gradient(180deg, #14181f 0%, #0c0f15 100%)",
            border: "1px solid #2a2f3a",
            borderRadius: 4,
            padding: "24px",
            fontFamily: "'JetBrains Mono', monospace",
            fontSize: 12,
            color: "#a8a498",
          }}>
            <div style={{ marginBottom: 24 }}>
              <div style={labelStyle}>A4 calibration · {a4} Hz</div>
              <input type="range" min={415} max={466} step={1} value={a4} onChange={(e) => setA4(parseInt(e.target.value, 10))} style={{ width: "100%" }} />
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10, color: "#5a5448", marginTop: 4 }}>
                <span>415 Baroque</span><span>440 Standard</span><span>442 Orchestral</span><span>466</span>
              </div>
              <div style={{ display: "flex", gap: 8, marginTop: 10, flexWrap: "wrap" }}>
                {[415, 432, 440, 441, 442, 443, 444].map((v) => (
                  <button key={v} onClick={() => setA4(v)} style={chipStyle(a4 === v)}>{v}</button>
                ))}
              </div>
            </div>

            <div style={{ marginBottom: 24 }}>
              <div style={labelStyle}>Accidentals</div>
              <div style={{ display: "flex", gap: 8 }}>
                <button onClick={() => setUseFlats(false)} style={chipStyle(!useFlats)}>♯ Sharps</button>
                <button onClick={() => setUseFlats(true)} style={chipStyle(useFlats)}>♭ Flats</button>
              </div>
            </div>

            <div style={{ marginBottom: 24 }}>
              <div style={labelStyle}>Instrument transposition</div>
              <select value={instrument} onChange={(e) => setInstrument(e.target.value)} style={{
                width: "100%", background: "#0a0d14", color: "#e8e6e1",
                border: "1px solid #2a2f3a", borderRadius: 2, padding: "8px 10px",
                fontFamily: "'JetBrains Mono', monospace", fontSize: 12,
              }}>
                {INSTRUMENTS.map((i) => (
                  <option key={i.id} value={i.id}>{i.label}</option>
                ))}
              </select>
              <div style={{ fontSize: 10, color: "#5a5448", marginTop: 6, lineHeight: 1.5 }}>
                Display shows the <em>written</em> note for your instrument.
              </div>
            </div>

            <div>
              <div style={labelStyle}>Reference tone (concert pitch)</div>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 10 }}>
                {refNoteList.map((n) => (
                  <button key={n} onClick={() => setRefNote(n)} style={{ ...chipStyle(refNote === n), minWidth: 36 }}>
                    {n.replace("#", "♯").replace("b", "♭")}
                  </button>
                ))}
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10, flexWrap: "wrap" }}>
                <span style={{ fontSize: 11, color: "#6a6458" }}>Octave</span>
                {[2, 3, 4, 5, 6].map((o) => (
                  <button key={o} onClick={() => setRefOctave(o)} style={chipStyle(refOctave === o)}>{o}</button>
                ))}
              </div>
              <div style={{ display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap" }}>
                {!refPlaying ? (
                  <button onClick={playReference} style={btnStyle("#4a5468", "#a8d8a8")}>
                    ▶ Play {refNote.replace("#", "♯").replace("b", "♭")}{refOctave}
                  </button>
                ) : (
                  <button onClick={stopReference} style={btnStyle("#6a4848", "#d88080")}>■ Stop tone</button>
                )}
                <span style={{ fontSize: 11, color: "#6a6458" }}>
                  {(noteToFreq(refNote, refOctave, a4) || 0).toFixed(2)} Hz
                </span>
              </div>
            </div>
          </div>
        )}

        <div style={{
          marginTop: 32,
          textAlign: "center",
          fontSize: 11,
          color: "#4a4438",
          letterSpacing: "0.1em",
          lineHeight: 1.6,
          fontFamily: "'JetBrains Mono', monospace",
        }}>
          play one note at a time · works best in a quiet room<br />
          voice, guitar, piano, wind & string instruments
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<Tuner />);
</script>
</body>
</html>
